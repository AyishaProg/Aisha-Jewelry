<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Aisha Jewelry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html#home">Home</a>
        <a href="index.html#products">Shop</a>
        <a href="cart.html" id="cart-badge">🛒 <span id="cart-count">0</span></a>
    </nav>

    <main class="cart-container">
        <h1>Your Shopping Cart</h1>
        <div id="cart-items" class="cart-items-list"></div>
        <div class="cart-summary">
            <h3>Total: <span id="cart-total">₵0.00</span></h3>
            <button id="clear-cart" class="btn-secondary">Clear Cart</button>
            <button id="checkout-btn" class="btn-primary">Proceed to Checkout</button>
        </div>
    </main>
    <script src="cart.js"></script>
</body>
</html>
